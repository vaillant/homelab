version: '3'

env:
  # Proxmox credentials from 1Password (bpg/proxmox provider format)
  PROXMOX_VE_ENDPOINT:
    sh: op read "op://Homelab/Proxmox/url" | sed 's|/api2/json||'
  PROXMOX_VE_API_TOKEN:
    sh: echo "$(op read 'op://Homelab/Proxmox/token_id')=$(op read 'op://Homelab/Proxmox/token_secret')"
  PROXMOX_VE_INSECURE: "true"
  # SSH private key for Proxmox disk operations
  PROXMOX_VE_SSH_PRIVATE_KEY:
    sh: op read "op://Homelab/Homelab SSH Key/private key"

vars:
  NODE: '{{.NODE | default "proxmox1"}}'
  DISK_STORAGE: '{{.DISK_STORAGE | default "local-zfs"}}'
  IMAGE_STORAGE: '{{.IMAGE_STORAGE | default "local"}}'
  BUILDER_HOST: '{{.BUILDER_HOST | default "nix-builder.svaillant.com"}}'
  NIXOS_VERSION: '{{.NIXOS_VERSION | default "24.11"}}'
  # SSH public key from 1Password for cloud-init
  SSH_PUBKEY:
    sh: op read "op://Homelab/Homelab SSH Key/public key"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  #
  # Utility tasks
  #

  check-env:
    desc: Check required tools
    silent: true
    cmds:
      - echo "Checking required tools..."
      - command -v nix >/dev/null 2>&1 || (echo "ERROR nix is not installed" && exit 1)
      - echo "✓ nix is installed"
      - command -v tofu >/dev/null 2>&1 || (echo "ERROR tofu (OpenTofu) is not available. Run 'nix-shell'" && exit 1)
      - echo "✓ tofu (OpenTofu) is available"
      - echo ""
      - echo "Checking environment variables..."
      - test -n "$PROXMOX_VE_ENDPOINT" || (echo "ERROR PROXMOX_VE_ENDPOINT is not set" && exit 1)
      - echo "✓ PROXMOX_VE_ENDPOINT is set"
      - test -n "$PROXMOX_VE_API_TOKEN" || (echo "ERROR PROXMOX_VE_API_TOKEN is not set" && exit 1)
      - echo "✓ PROXMOX_VE_API_TOKEN is set"
      - echo ""
      - echo "✅ All checks passed!"

  check:
    desc: Test Proxmox API connection
    deps: [check-env]
    cmds:
      - echo "Testing Proxmox API connection..."
      - |
        curl -s -k -f \
          -H "Authorization: PVEAPIToken=$PROXMOX_VE_API_TOKEN" \
          "${PROXMOX_VE_ENDPOINT}api2/json/version" | jq -r '"✓ Connected to Proxmox VE v\(.data.version) (\(.data.release))"' \
          || (echo "✗ Failed to connect to Proxmox API" && exit 1)

  fmt:
    desc: Format Terraform files
    dir: terraform
    cmds:
      - tofu fmt -recursive

  #
  # Phase 1: Deploy builder
  #

  builder-init:
    desc: Initialize builder environment
    dir: terraform/env-1-builder
    cmds:
      - tofu init

  builder-plan:
    desc: Plan builder changes
    deps: [check]
    dir: terraform/env-1-builder
    cmds:
      - |
        tofu plan \
          -var="target_node={{.NODE}}" \
          -var="storage={{.IMAGE_STORAGE}}" \
          -var="disk_storage={{.DISK_STORAGE}}" \
          -var="nixos_version={{.NIXOS_VERSION}}" \
          -var="ssh_pubkey={{.SSH_PUBKEY}}"

  builder-apply:
    desc: Apply builder changes
    deps: [check]
    dir: terraform/env-1-builder
    cmds:
      - |
        tofu apply -auto-approve \
          -var="target_node={{.NODE}}" \
          -var="storage={{.IMAGE_STORAGE}}" \
          -var="disk_storage={{.DISK_STORAGE}}" \
          -var="nixos_version={{.NIXOS_VERSION}}" \
          -var="ssh_pubkey={{.SSH_PUBKEY}}"

  builder-output:
    desc: Show builder outputs (refreshes state first)
    dir: terraform/env-1-builder
    cmds:
      - |
        tofu refresh \
          -var="target_node={{.NODE}}" \
          -var="storage={{.IMAGE_STORAGE}}" \
          -var="disk_storage={{.DISK_STORAGE}}" \
          -var="nixos_version={{.NIXOS_VERSION}}" \
          -var="ssh_pubkey={{.SSH_PUBKEY}}"
      - tofu output

  #
  # Phase 2: Build and upload NixOS LXC image
  #

  lxc-build:
    desc: Build NixOS LXC image on nix-builder and upload to Proxmox
    deps: [check, secrets-init]
    cmds:
      - echo "Building NixOS LXC image on {{.BUILDER_HOST}}..."
      # Copy nix/ directory to builder (excluding result symlinks)
      - rsync -avz --delete --exclude='result' --exclude='result-*' nix/ root@{{.BUILDER_HOST}}:/tmp/homelab-nix/
      # Build on remote builder
      - ssh root@{{.BUILDER_HOST}} "cd /tmp/homelab-nix && nix build .#proxmox-lxc-base --out-link result"
      # Upload directly from builder to Proxmox
      - echo "Uploading to Proxmox {{.NODE}}..."
      - |
        ssh root@{{.BUILDER_HOST}} "
          TARBALL=\$(ls /tmp/homelab-nix/result/tarball/*.tar.xz)
          FILENAME=\$(basename \$TARBALL)
          echo \"Uploading \$FILENAME...\"
          curl -s -k -f \
            -H \"Authorization: PVEAPIToken=$PROXMOX_VE_API_TOKEN\" \
            -H 'Content-Type: multipart/form-data' \
            -F 'content=vztmpl' \
            -F \"filename=@\$TARBALL\" \
            \"${PROXMOX_VE_ENDPOINT}/api2/json/nodes/{{.NODE}}/storage/{{.IMAGE_STORAGE}}/upload\" \
            | jq -r '\"✓ Uploaded: \(.data)\"' \
            || (echo '✗ Failed to upload template' && exit 1)
          echo ''
          echo \"Template available at: {{.IMAGE_STORAGE}}:vztmpl/\$FILENAME\"
        "
      # Cleanup
      - ssh root@{{.BUILDER_HOST}} "rm -rf /tmp/homelab-nix"
      - echo "✓ Build and upload complete"

  #
  # Phase 3: Deploy production
  #

  production-init:
    desc: Initialize production environment
    dir: terraform/env-2-production
    cmds:
      - tofu init

  production-plan:
    desc: Plan production changes
    deps: [check]
    dir: terraform/env-2-production
    cmds:
      - tofu plan -var="default_storage={{.DISK_STORAGE}}"

  production-apply:
    desc: Apply production changes
    deps: [check]
    dir: terraform/env-2-production
    cmds:
      - tofu apply -var="default_storage={{.DISK_STORAGE}}"

  production-output:
    desc: Show production outputs
    dir: terraform/env-2-production
    cmds:
      - tofu output

  #
  # Secrets management
  #

  secrets-init:
    desc: Populate secrets from 1Password
    cmds:
      - mkdir -p nix/secrets
      # Required: SSH public key for base image
      - op read "op://Homelab/Homelab SSH Key/public key" > nix/secrets/ssh-pubkey
      - echo "✓ ssh-pubkey"
      # Optional: Cloudflared tunnel token (skip if not configured yet)
      - op read "op://Homelab/Cloudflared/tunnel-token" > nix/secrets/cloudflared-token 2>/dev/null || echo "⚠ Cloudflared token not found (skipped)"
      # Optional: Pulse Proxmox credentials
      - op read "op://Homelab/Proxmox/token_id" > nix/secrets/pulse-proxmox-token-id 2>/dev/null || echo "⚠ Proxmox token_id not found (skipped)"
      - op read "op://Homelab/Proxmox/token_secret" > nix/secrets/pulse-proxmox-token-secret 2>/dev/null || echo "⚠ Proxmox token_secret not found (skipped)"
      - echo "✓ Secrets populated in nix/secrets/"

  #
  # Phase 4: Deploy NixOS configurations
  #

  deploy-cloudflared:
    desc: Deploy cloudflared configuration
    cmds:
      - echo "Deploying cloudflared to cloudflared.svaillant.com..."
      - nixos-rebuild switch --target-host root@cloudflared.svaillant.com --flake ./nix#cloudflared --use-remote-sudo

  deploy-pulse:
    desc: Deploy pulse configuration
    cmds:
      - echo "Deploying pulse to pulse.svaillant.com..."
      - nixos-rebuild switch --target-host root@pulse.svaillant.com --flake ./nix#pulse --use-remote-sudo

  deploy-bose-soundtouch:
    desc: Deploy bose-soundtouch configuration
    cmds:
      - echo "Deploying bose-soundtouch to bose-soundtouch.svaillant.com..."
      - nixos-rebuild switch --target-host root@bose-soundtouch.svaillant.com --flake ./nix#bose-soundtouch --use-remote-sudo

  deploy-all:
    desc: Deploy all container configurations
    cmds:
      - task: deploy-cloudflared
      - task: deploy-pulse
      - task: deploy-bose-soundtouch
